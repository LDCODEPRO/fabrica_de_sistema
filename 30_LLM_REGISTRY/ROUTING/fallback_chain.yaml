# LLM Fallback Chain
# Versão: 1.0.0
# Data: 2026-06-05
# Baseado em evidências de E:\Agente X\ e E:\NIVEL 1\DATASTORE\Complexo_Nexus\

fallback_chain:
  - tier: 0
    name: "LOCAL"
    providers: [ollama]
    models: [llama3, ollama-local]
    cost: "$0.00"
    trigger: "SEMPRE — tentar primeiro"

  - tier: 1
    name: "ECONÔMICO"
    providers: [groq, deepseek]
    models: [groq-llama3, deepseek-v4-pro]
    cost: "< $0.01/1K tokens"
    trigger: "Ollama indisponível OU tarefa requer API"

  - tier: 2
    name: "PRODUÇÃO"
    providers: [anthropic, google]
    models: [claude-haiku, gemini-flash, claude-haiku-4-5-20251001]
    cost: "$0.01–$0.10/1K tokens"
    trigger: "Tier 1 insuficiente OU qualidade necessária"

  - tier: 3
    name: "ALTA COMPLEXIDADE"
    providers: [anthropic, openai]
    models: [claude-opus, claude-sonnet, gpt-4o]
    cost: "$0.10–$1.00+/1K tokens"
    trigger: "Tarefa complexa, raciocínio profundo, arquitetura"

  - tier: 4
    name: "GATEWAY"
    providers: [openrouter, together]
    models: ["*"]
    cost: "variável"
    trigger: "Todos os anteriores falharam OU necessidade especial"

cost_limits:
  agente_x:
    daily_soft: "$2.00"
    daily_hard: "$5.00"
    evidence: "E:\\Agente X\\.env (SECRET_DETECTED — limite detectado)"
  phandora:
    daily: "$1.00"
    per_mission: "$0.25"
    evidence: "E:\\PHANDORA\\04_CONFIG\\cost_policy.json"

routing_strategy:
  complexity_low:    { primary: groq-llama3,    fallback: gemini-flash }
  complexity_medium: { primary: claude-haiku,   fallback: gemini-pro }
  complexity_high:   { primary: claude-opus,    fallback: gpt-4o }
  coding:            { primary: deepseek-v4-pro, fallback: claude-sonnet }
  embeddings:        { primary: voyage-2,        fallback: text-embedding-3-small }
  local_only:        { primary: ollama-local,    fallback: null }
