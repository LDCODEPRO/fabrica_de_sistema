version: '3.8'

services:
  operational_core:
    build: .
    container_name: operational_core
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
      # SQLite persistency
      - nexus_data:/app/data

volumes:
  nexus_data:
